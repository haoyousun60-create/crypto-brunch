    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        :root{--bg:#08080f;--card:#12121f;--card2:#1a1a2e;--border:#252540;--text:#e8e8f0;--gray:#8888a0;--gold:#f0b90b;--orange:#ff8c00;--green:#00d68f;--red:#f6465d;--blue:#3b82f6}

        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Noto Sans SC',sans-serif;background:var(--bg);color:var(--text);line-height:1.7;padding-bottom:70px}
        a{color:inherit;text-decoration:none}
        .container{max-width:900px;margin:0 auto;padding:0 16px}

        /* === TICKER === */
        .ticker-wrap{background:var(--card);padding:6px 0;overflow:hidden;border-bottom:1px solid var(--border)}

        .ticker-item{padding:0 24px;font-size:.82em;font-weight:500}
        @keyframes tickScroll{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}

        /* === NAV === */
        .nav{position:sticky;top:0;z-index:100;background:rgba(8,8,15,.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:10px 0}
        .nav .container{display:flex;justify-content:space-between;align-items:center}
        .nav-brand{font-size:1.2em;font-weight:800}
        .nav-brand span{background:linear-gradient(135deg,var(--gold),var(--orange));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
        .nav-tabs{display:flex;gap:4px}
        .nav-tab{color:var(--gray);font-size:.85em;padding:6px 14px;border-radius:8px;transition:all .2s;cursor:pointer}
        .nav-tab.active{color:var(--text);background:var(--card2)}
        .nav-tab:hover{color:var(--text)}

        /* === LIVE BAR === */
        .live-bar{background:var(--card);border-bottom:1px solid var(--border);padding:12px 0;overflow-x:auto;-webkit-overflow-scrolling:touch}
        .live-bar::-webkit-scrollbar{display:none}
        .live-bar-inner{display:flex;gap:16px;min-width:max-content;padding:0 16px}
        .live-coin{text-align:center;min-width:80px}
        .live-coin .sym{font-weight:700;font-size:.88em}
        .live-coin .price{font-size:.82em;margin-top:2px}
        .live-coin .chg{font-size:.75em;margin-top:1px}
        .up{color:var(--green)}.down{color:var(--red)}

        /* === PAGE SECTIONS === */
        .page{display:none}
        .page.active{display:block}

        /* === NEWS PAGE (MAIN) === */
        .news-header{padding:20px 0 12px;display:flex;justify-content:space-between;align-items:center}
        .news-header h2{font-size:1.3em;font-weight:800}
        .news-header h2 span{background:linear-gradient(135deg,var(--gold),var(--orange));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
        .news-live{display:flex;align-items:center;gap:6px;font-size:.78em;color:var(--green)}
        .news-live .dot{width:8px;height:8px;background:var(--green);border-radius:50%;animation:pulse 1.5s infinite}
        @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
        .news-updated{font-size:.75em;color:var(--gray);margin-bottom:16px}

        .news-list{list-style:none}
        .news-item{background:var(--card);border:1px solid var(--border);border-radius:14px;margin-bottom:10px;overflow:hidden;transition:all .2s}
        .news-item:hover{border-color:var(--gold)30}
        .news-item:active{transform:scale(.995)}
        .news-head{padding:16px;cursor:pointer;display:flex;gap:12px}
        .news-time-badge{min-width:52px;text-align:center;padding-top:2px}
        .news-time-badge .t{font-size:.72em;color:var(--gray);white-space:nowrap}
        .news-body{flex:1}
        .news-title{font-size:.95em;font-weight:600;line-height:1.6}
        .news-tags{margin-top:6px;display:flex;gap:6px;flex-wrap:wrap}
        .news-tag{font-size:.7em;padding:2px 8px;background:var(--card2);border-radius:4px;color:var(--gray)}
        .news-expand{max-height:0;overflow:hidden;transition:max-height .3s ease}
        .news-item.open .news-expand{max-height:600px}
        .news-desc{padding:0 16px 16px;font-size:.9em;color:var(--gray);line-height:1.8;border-top:1px solid var(--border);margin:0 16px;padding-top:12px}
        .news-desc a{color:var(--gold);font-weight:600}
        .news-arrow{color:var(--gray);font-size:.75em;transition:transform .3s;min-width:20px;text-align:center;padding-top:2px}
        .news-item.open .news-arrow{transform:rotate(180deg)}

        .news-loading{text-align:center;padding:60px 20px;color:var(--gray)}
        .news-empty{text-align:center;padding:40px;color:var(--gray);font-size:.9em}

        /* Flash highlight for new items */
        .news-item.flash{animation:newsFlash .6s ease}
        @keyframes newsFlash{0%{background:var(--gold)10;border-color:var(--gold)}100%{background:transparent}}

        /* === PRICES PAGE === */
        .prices-header{padding:20px 0 16px}

        .prices-header h2 span{background:linear-gradient(135deg,var(--gold),var(--orange));-webkit-background-clip:text;-webkit-text-fill-color:transparent}

        .price-row:hover{border-color:var(--gold)30}
        .price-left{display:flex;align-items:center;gap:12px}
        .price-icon{width:36px;height:36px;border-radius:50%;background:var(--card2);display:flex;align-items:center;justify-content:center;font-size:1.1em}
        .price-name{font-weight:700;font-size:1em}

        .price-right{text-align:right}

        .ex-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px;transition:all .2s}

        .ex-card.top{border-color:var(--gold)50}
        .ex-top-row{display:flex;justify-content:space-between;align-items:center}
        .ex-info{display:flex;align-items:center;gap:12px}
        .ex-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.3em;font-weight:800}

        .ex-meta{font-size:.75em;color:var(--gray);margin-top:2px}
        .ex-btn{padding:8px 18px;border-radius:8px;font-weight:700;font-size:.82em;color:#fff;display:inline-block;transition:all .2s}

        .bottom-nav{position:fixed;bottom:0;left:0;right:0;background:rgba(18,18,31,.97);backdrop-filter:blur(12px);border-top:1px solid var(--border);padding:6px 0 env(safe-area-inset-bottom,6px);z-index:200}

        .bnav-item.active{color:var(--gold)}
        .bnav-icon{font-size:1.4em}

        /* === INSTALL BANNER === */
        .install-banner{display:none;position:fixed;bottom:60px;left:10px;right:10px;background:linear-gradient(135deg,var(--gold),var(--orange));color:#000;padding:12px 16px;border-radius:12px;z-index:300;box-shadow:0 6px 24px rgba(0,0,0,.5);align-items:center;justify-content:space-between;gap:10px}

        .install-btn{background:#000;color:var(--gold);border:none;padding:8px 16px;border-radius:8px;font-weight:700;cursor:pointer;white-space:nowrap;font-size:.82em}
        .install-close{background:none;border:none;color:#000;font-size:1.2em;cursor:pointer;padding:4px}

        @media(min-width:768px){
            .ex-features{grid-template-columns:1fr 1fr 1fr}
            .bottom-nav{display:none}
            body{padding-bottom:0}
        }
    </style>
</head>

// ============================================================
// PAGE NAVIGATION
// ============================================================
function switchPage(page) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById('page-' + page)?.classList.add('active');
    document.querySelectorAll('.nav-tab').forEach(t => t.classList.toggle('active', t.dataset.page === page));
    document.querySelectorAll('.bnav-item').forEach(b => b.classList.toggle('active', b.dataset.page === page));
}

document.getElementById('navTabs').addEventListener('click', e => {
    const tab = e.target.closest('[data-page]');
    if (tab) switchPage(tab.dataset.page);
});
document.getElementById('bottomNav').addEventListener('click', e => {
    const tab = e.target.closest('[data-page]');
    if (tab) switchPage(tab.dataset.page);
});

// ============================================================
// NEWS
// ============================================================
async function fetchNews() {
    const list = document.getElementById('newsList');
    const sources = [
        { url: 'news.json', type: 'json' },
        { url: '/api/news', type: 'json' }
    ];
    for (const src of sources) {
        try {
            const resp = await fetch(src.url + '?t=' + Date.now(), {signal: AbortSignal.timeout(8000)});
            if (!resp.ok) continue;
            const data = await resp.json();
            if (data.items && data.items.length > 0) {
                renderNews(data.items);
                if (data.updated) {
                    const d = new Date(data.updated);
                    document.getElementById('newsUpdated').textContent = '最后更新：' + d.toLocaleString('zh-CN', {timeZone:'Asia/Shanghai'});
                }
                return;
            }
        } catch(e) { continue; }
    }
    list.innerHTML = '<li class="news-empty">暂时无法加载快讯，请稍后刷新</li>';
}

function renderNews(items) {
    const list = document.getElementById('newsList');
    const now = Date.now();
    list.innerHTML = items.map((item, i) => {
        let timeStr = '';
        if (item.pubDate) {
            const diff = now - new Date(item.pubDate).getTime();
            const mins = Math.floor(diff / 60000);
            if (mins < 1) timeStr = '刚刚';
            else if (mins < 60) timeStr = mins + '分钟前';
            else if (mins < 1440) timeStr = Math.floor(mins/60) + '小时前';
            else timeStr = Math.floor(mins/1440) + '天前';
        }
        const title = item.title || '';
        const desc = item.description || '';
        const link = item.link || '#';
        // Extract tags from title
        const tags = [];
        if (/BTC|比特币|Bitcoin/i.test(title+desc)) tags.push('BTC');
        if (/ETH|以太坊|Ethereum/i.test(title+desc)) tags.push('ETH');
        if (/SOL|Solana/i.test(title+desc)) tags.push('SOL');
        if (/币安|Binance/i.test(title+desc)) tags.push('币安');
        if (/SEC|监管|合规/i.test(title+desc)) tags.push('监管');
        if (/ETF/i.test(title+desc)) tags.push('ETF');
        if (/NFT/i.test(title+desc)) tags.push('NFT');
        if (/DeFi/i.test(title+desc)) tags.push('DeFi');

        const hasDesc = desc && desc !== title && desc.length > 10;

        return `<li class="news-item${i === 0 ? ' flash' : ''}" onclick="this.classList.toggle('open')">
            <div class="news-head">
                <div class="news-time-badge"><div class="t">${timeStr}</div></div>
                <div class="news-body">
                    <div class="news-title">${title}</div>
                    ${tags.length ? '<div class="news-tags">' + tags.map(t => '<span class="news-tag">' + t + '</span>').join('') + '</div>' : ''}
                </div>
                ${hasDesc ? '<div class="news-arrow">▼</div>' : ''}
            </div>
            ${hasDesc ? `<div class="news-expand"><div class="news-desc">${desc}<br><a href="${link}" target="_blank" rel="noopener">查看原文 →</a></div></div>` : ''}
        </li>`;
    }).join('');
}

// ============================================================
// PRICES
// ============================================================
async function fetchPrices() {
    try {
        const syms = coins.map(c => c.s);
        const resp = await fetch('https://api.binance.com/api/v3/ticker/24hr?symbols=' + encodeURIComponent(JSON.stringify(syms)));
        const data = await resp.json();
        const map = {}; data.forEach(t => map[t.symbol] = t);
        const items = coins.map(c => ({...c, price: parseFloat(map[c.s]?.lastPrice||0), change: parseFloat(map[c.s]?.priceChangePercent||0)}));

        // Live bar
        const bar = document.getElementById('liveBar');
        bar.innerHTML = items.slice(0, 8).map(c => {
            const isUp = c.change >= 0;
            const ps = c.price >= 1 ? '$' + c.price.toLocaleString('en',{maximumFractionDigits:2}) : '$' + c.price.toFixed(6);
            return `<div class="live-coin"><div class="sym">${c.sym}</div><div class="price">${ps}</div><div class="chg ${isUp?'up':'down'}">${isUp?'+':''}${c.change.toFixed(2)}%</div></div>`;
        }).join('');

        // Ticker
        const ticker = document.getElementById('ticker');
        let html = items.map(c => {
            const isUp = c.change >= 0;
            const ps = c.price >= 1 ? '$'+c.price.toLocaleString('en',{maximumFractionDigits:2}) : '$'+c.price.toFixed(6);
            return `<span class="ticker-item" style="color:${isUp?'var(--green)':'var(--red)'}">${c.sym} ${ps} ${isUp?'▲':'▼'}${Math.abs(c.change).toFixed(2)}%</span>`;
        }).join('');
        ticker.innerHTML = html + html;

        // Price list page
        const pl = document.getElementById('priceList');
        pl.innerHTML = items.map(c => {
            const isUp = c.change >= 0;
            const ps = c.price >= 1 ? '$' + c.price.toLocaleString('en',{minimumFractionDigits:2,maximumFractionDigits:2}) : '$' + c.price.toFixed(8);
            return `<div class="price-row"><div class="price-left"><div class="price-icon">${c.icon}</div><div><div class="price-name">${c.sym}</div><div class="price-sym">${c.n}</div></div></div><div class="price-right"><div class="price-val">${ps}</div><div class="price-chg ${isUp?'up':'down'}">${isUp?'▲ +':'▼ '}${Math.abs(c.change).toFixed(2)}%</div></div></div>`;
        }).join('');
    } catch(e) { console.error(e); }
}

// ============================================================
// EXCHANGES
// ============================================================
function renderExchanges() {
    document.getElementById('exList').innerHTML = exchanges.map(ex => `
        <div class="ex-card${ex.top?' top':''}" onclick="this.classList.toggle('open')">
            <div class="ex-top-row">
                <div class="ex-info">
                    <div class="ex-icon" style="background:${ex.color}20;color:${ex.color}">${ex.icon}</div>
                    <div>
                        <div class="ex-name">${ex.name}</div>
                        <div class="ex-meta">${ex.rank} · ${ex.coins}币种 · 费率${ex.fee} · ${ex.desc}</div>
                    </div>
                </div>
                <a href="${ex.url}" target="_blank" rel="noopener" class="ex-btn" style="background:${ex.color};color:${ex.color==='#FFFFFF'||ex.color==='#F0B90B'?'#000':'#fff'}" onclick="event.stopPropagation()">注册</a>
            </div>
            <div class="ex-details">
                <ul class="ex-features">${ex.features.map(f=>'<li>'+f+'</li>').join('')}</ul>
                <div class="ex-code">邀请码 <strong>${ex.code}</strong> · ${ex.discount} <span style="color:var(--gray);font-size:.8em">注册后无法补填</span></div>
            </div>
        </div>
    `).join('');
}

// ============================================================
// PWA INSTALL
// ============================================================
let deferredPrompt = null;
window.addEventListener('beforeinstallprompt', e => {
    e.preventDefault(); deferredPrompt = e;
    setTimeout(() => { if (!localStorage.getItem('cb_i')) document.getElementById('installBanner').classList.add('show'); }, 6000);
});
document.getElementById('installBtn')?.addEventListener('click', async () => {
    if (deferredPrompt) { deferredPrompt.prompt(); const r = await deferredPrompt.userChoice; if (r.outcome==='accepted') localStorage.setItem('cb_i','1'); deferredPrompt=null; }
    else alert('iOS：点分享 ⬆️ → 添加到主屏幕');
    document.getElementById('installBanner').classList.remove('show');
});
document.getElementById('installClose')?.addEventListener('click', () => { document.getElementById('installBanner').classList.remove('show'); localStorage.setItem('cb_i','1'); });
if (/iPhone|iPad/.test(navigator.userAgent) && !navigator.standalone) setTimeout(() => { if (!localStorage.getItem('cb_i')) document.getElementById('installBanner').classList.add('show'); }, 8000);

// ============================================================
// SERVICE WORKER
// ============================================================
if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(()=>{});

// ============================================================
// INIT
// ============================================================
renderExchanges();
fetchPrices();
fetchNews();
setInterval(fetchPrices, 10000);
setInterval(fetchNews, 300000);
</script>
