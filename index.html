<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#08080f;--card:#12121f;--card2:#1a1a2e;--border:#252540;--text:#e8e8f0;--gray:#8888a0;--gold:#f0b90b;--orange:#ff8c00;--green:#00d68f;--red:#f6465d;--blue:#3b82f6}
html{scroll-behavior:smooth}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Noto Sans SC',sans-serif;background:var(--bg);color:var(--text);line-height:1.7;padding-bottom:68px}
a{color:inherit;text-decoration:none}
.container{max-width:900px;margin:0 auto;padding:0 14px}

/* NAV */
.nav{position:sticky;top:0;z-index:100;background:rgba(8,8,15,.96);backdrop-filter:blur(14px);border-bottom:1px solid var(--border);padding:10px 0}
.nav .container{display:flex;justify-content:space-between;align-items:center}
.nav-brand{font-size:1.15em;font-weight:800}
.nav-brand span{background:linear-gradient(135deg,var(--gold),var(--orange));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.nav-tabs{display:flex;gap:2px}
.nav-tab{color:var(--gray);font-size:.8em;padding:5px 12px;border-radius:8px;cursor:pointer;transition:all .2s;white-space:nowrap}
.nav-tab.active{color:#000;background:var(--gold);font-weight:700}

/* LIVE BAR */
.live-bar{background:var(--card);border-bottom:1px solid var(--border);overflow:hidden;padding:0}
.live-track{display:flex;animation:liveScroll 30s linear infinite;white-space:nowrap}
.live-track:hover{animation-play-state:paused}
.lc{display:inline-flex;align-items:center;gap:8px;padding:12px 20px;border-right:1px solid var(--border);white-space:nowrap;min-width:max-content}
.lc .s{font-weight:800;font-size:.9em}
.lc .p{font-weight:600;font-size:.88em}
.lc .c{font-size:.82em;font-weight:600;padding:2px 6px;border-radius:4px}
.lc .c.up{background:var(--green)15;color:var(--green)}
.lc .c.dn{background:var(--red)15;color:var(--red)}
.up{color:var(--green)}.dn{color:var(--red)}
@keyframes liveScroll{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}

/* PAGES */
.page{display:none}.page.active{display:block}

/* ===== NEWS (主页) ===== */
.sec-head{padding:16px 0 10px;display:flex;justify-content:space-between;align-items:center}
.sec-head h2{font-size:1.2em;font-weight:800}
.sec-head h2 em{font-style:normal;background:linear-gradient(135deg,var(--gold),var(--orange));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.live-dot{display:flex;align-items:center;gap:5px;font-size:.75em;color:var(--green)}
.live-dot i{width:7px;height:7px;background:var(--green);border-radius:50%;display:inline-block;animation:blink 1.5s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
.updated{font-size:.72em;color:var(--gray);margin-bottom:12px}
.nlist{list-style:none}
.ni{background:var(--card);border:1px solid var(--border);border-radius:12px;margin-bottom:8px;overflow:hidden;transition:border-color .2s}
.ni:active{transform:scale(.998)}

.nh{padding:14px 14px 0;display:flex;gap:10px}
.nt-badge{min-width:48px;padding-top:1px}
.nt-badge span{font-size:.7em;color:var(--gray);white-space:nowrap}
.nb{flex:1}
.ntitle{font-size:.92em;font-weight:600;line-height:1.55}
.ntags{margin-top:5px;display:flex;gap:4px;flex-wrap:wrap}
.ntag{font-size:.65em;padding:1px 7px;background:var(--card2);border-radius:4px;color:var(--gold)}
.narrow{color:var(--gray);font-size:.7em;transition:transform .3s;padding-top:1px}

.nexp{overflow:hidden}

.ndesc{padding:8px 14px 14px;font-size:.86em;color:var(--gray);line-height:1.75;margin:0 14px}
.ndesc a{color:var(--gold);font-weight:600}
.ni:first-child{animation:flash .5s}
@keyframes flash{0%{border-color:var(--gold);box-shadow:0 0 12px var(--gold)20}100%{border-color:var(--border);box-shadow:none}}
.nempty{text-align:center;padding:50px 20px;color:var(--gray)}



/* ===== PRICES ===== */
.plist{display:flex;flex-direction:column;gap:6px}
.pr{display:flex;justify-content:space-between;align-items:center;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px 14px;transition:border-color .2s}
.pr:hover{border-color:var(--gold)30}
.pl{display:flex;align-items:center;gap:10px}
.pi{width:34px;height:34px;border-radius:50%;background:var(--card2);display:flex;align-items:center;justify-content:center;font-size:1em}
.pn{font-weight:700;font-size:.95em}
.ps{font-size:.72em;color:var(--gray)}
.pv{font-weight:600;font-size:.95em}
.pc{font-size:.78em;margin-top:1px}

/* ===== EXCHANGES ===== */
.elist{display:flex;flex-direction:column;gap:8px;padding-bottom:20px}
.ec{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;transition:all .2s;cursor:pointer}
.ec:hover,.ec.open{border-color:var(--gold)40}
.ec.top{border-left:3px solid var(--gold)}
.erow{display:flex;justify-content:space-between;align-items:center}
.einfo{display:flex;align-items:center;gap:10px}
.eico{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:1.2em;font-weight:800}
.en{font-weight:700;font-size:.95em}
.em{font-size:.72em;color:var(--gray);margin-top:1px}
.ebtn{padding:7px 16px;border-radius:8px;font-weight:700;font-size:.78em;color:#fff;display:inline-block}
.edet{margin-top:12px;padding-top:10px;border-top:1px solid var(--border);display:none}
.ec.open .edet{display:block}
.ef{list-style:none;display:grid;grid-template-columns:1fr 1fr;gap:3px}
.ef li{font-size:.78em;color:var(--gray);padding:1px 0}
.ef li::before{content:'✓ ';color:var(--green)}
.ecode{margin-top:8px;background:var(--card2);padding:8px 12px;border-radius:8px;font-size:.82em;display:flex;justify-content:space-between;align-items:center}
.ecode strong{color:var(--green)}

/* BOTTOM NAV */
.bnav{position:fixed;bottom:0;left:0;right:0;background:rgba(18,18,31,.97);backdrop-filter:blur(12px);border-top:1px solid var(--border);padding:5px 0 env(safe-area-inset-bottom,5px);z-index:200}
.bnav-in{display:flex;justify-content:space-around;max-width:450px;margin:0 auto}
.bi-tab{display:flex;flex-direction:column;align-items:center;gap:1px;color:var(--gray);font-size:.65em;padding:5px 14px;cursor:pointer;border:none;background:none;transition:color .2s}
.bi-tab.active{color:var(--gold)}
.bi-tab .ico{font-size:1.35em}

/* INSTALL */
.ibanner{display:none;position:fixed;bottom:58px;left:8px;right:8px;background:linear-gradient(135deg,var(--gold),var(--orange));color:#000;padding:10px 14px;border-radius:10px;z-index:300;box-shadow:0 4px 20px rgba(0,0,0,.5);align-items:center;justify-content:space-between;gap:8px}
.ibanner.show{display:flex}
.ibanner .it{font-weight:700;font-size:.85em}
.ibanner .is{font-size:.7em;opacity:.8}
.ibtn{background:#000;color:var(--gold);border:none;padding:7px 14px;border-radius:7px;font-weight:700;cursor:pointer;font-size:.78em}
.iclose{background:none;border:none;color:#000;font-size:1.1em;cursor:pointer}

@media(min-width:768px){.bnav{display:none}body{padding-bottom:0}.ef{grid-template-columns:1fr 1fr 1fr}}
</style>
</head>
<body>

<nav class="nav">
<div class="container">

<div class="live-bar"><div class="live-track" id="liveBar">加载中...</div></div>

<!-- ============ 快讯 (首页) ============ -->
<div class="page active" id="p-news">
<div class="container">

    </div>

</div>

<!-- ============ 交易所 ============ -->

<div class="container">

    <p style="color:var(--gray);font-size:.82em;margin-bottom:14px">邀请码注册永久减手续费 · 注册后无法补填</p>
    <div class="elist" id="elist"></div>
</div>
</div>

<nav class="bnav"><div class="bnav-in" id="bnav">

    <button class="bi-tab" data-p="prices"><span class="ico">📊</span>行情</button>
    <button class="bi-tab" data-p="exchanges"><span class="ico">🏦</span>交易所</button>
</div></nav>

<div class="ibanner" id="ib">
    <div><div class="it">🤑 安装马上发财快讯</div><div class="is">主屏快捷查行情</div></div>
    <button class="ibtn" id="ibtn">安装</button>
    <button class="iclose" id="ic">✕</button>
</div>

<script>
const EX=[
{id:'binance',name:'币安 Binance',icon:'₿',color:'#F0B90B',url:'https://accounts.bmwweb.academy/register?ref=GFPDGUGI',code:'GFPDGUGI',top:1,desc:'全球#1，流动性最强',fee:'0.1%',disc:'20%减免',rank:'#1',coins:'500+',ft:['日交易量$200亿+','C2C支付宝/微信','SAFU基金保障','币安学院新手引导','Launchpad打新','Alpha积分空投']},
{id:'okx',name:'欧易 OKX',icon:'⬡',color:'#FFFFFF',url:'https://www.firgrouxywebb.com/join/789789',code:'789789',top:1,desc:'合约最强+Web3钱包',fee:'0.1%',disc:'手续费减免',rank:'#2-3',coins:'350+',ft:['衍生品全球领先','OKX Web3钱包','交易机器人/跟单','P2P多种支付']},
{id:'gate',name:'Gate.io',icon:'G',color:'#2354E6',url:'https://www.gateport.business/share/XCCOBGVJ',code:'XCCOBGVJ',desc:'1700+币种，新币最快',fee:'0.2%',disc:'手续费减免',rank:'#5-8',coins:'1700+',ft:['全网最多币种','新币上线最快','Startup打新','量化工具丰富']},
{id:'htx',name:'火币 HTX',icon:'H',color:'#1C63F2',url:'https://www.htx.com.gt/invite/zh-cn/1h?invite_code=vafqb223',code:'vafqb223',desc:'老牌稳定，2013年创立',fee:'0.2%',disc:'手续费减免',rank:'#5-10',coins:'600+',ft:['2013年创立','中文社区深厚','Primelist首发','全球合规']},
{id:'bitget',name:'Bitget',icon:'B',color:'#00D4AA',url:'https://partner.hdmune.cn/bg/7n43xlxz',code:'7n43xlxz',desc:'跟单交易全球第一',fee:'0.1%',disc:'手续费减免',rank:'#4-6',coins:'800+',ft:['跟单系统#1','合约体验丝滑','增长最快','BGB生态发力']},
{id:'bitmart',name:'BitMart',icon:'M',color:'#00B897',url:'https://www.bm-link.com/zh-CN/invite/baofu2026',code:'baofu2026',desc:'Meme币首发，小币天堂',fee:'0.25%',disc:'手续费减免',rank:'#10-15',coins:'1000+',ft:['小币种上线快','Meme币首发多','界面简洁','多种理财']},
{id:'weex',name:'WEEX',icon:'W',color:'#6366F1',url:'https://weabaxx.site/zh-CN/register?vipCode=baofu2026',code:'baofu2026',desc:'费率最低0.05%',fee:'0.05%',disc:'手续费减免',rank:'新锐',coins:'300+',ft:['费率行业最低','新人福利丰厚','合约深度好','跟单+量化']}
];
const COINS=[
{s:'BTCUSDT',n:'Bitcoin',sym:'BTC',i:'₿'},{s:'ETHUSDT',n:'Ethereum',sym:'ETH',i:'Ξ'},{s:'BNBUSDT',n:'BNB',sym:'BNB',i:'◆'},
{s:'SOLUSDT',n:'Solana',sym:'SOL',i:'◎'},{s:'XRPUSDT',n:'XRP',sym:'XRP',i:'✕'},{s:'DOGEUSDT',n:'Dogecoin',sym:'DOGE',i:'Ð'},
{s:'ADAUSDT',n:'Cardano',sym:'ADA',i:'₳'},{s:'AVAXUSDT',n:'Avalanche',sym:'AVAX',i:'▲'},{s:'PEPEUSDT',n:'PEPE',sym:'PEPE',i:'🐸'},
{s:'SUIUSDT',n:'Sui',sym:'SUI',i:'💧'},{s:'LINKUSDT',n:'Chainlink',sym:'LINK',i:'⬡'},{s:'DOTUSDT',n:'Polkadot',sym:'DOT',i:'●'}
];

// NAV
function go(p){
    document.querySelectorAll('.page').forEach(x=>x.classList.remove('active'));
    document.getElementById('p-'+p)?.classList.add('active');
    document.querySelectorAll('[data-p]').forEach(x=>x.classList.toggle('active',x.dataset.p===p));
    window.scrollTo(0,0);
}
document.getElementById('tabs').onclick=e=>{const t=e.target.closest('[data-p]');if(t)go(t.dataset.p)};
document.getElementById('bnav').onclick=e=>{const t=e.target.closest('[data-p]');if(t)go(t.dataset.p)};

// NEWS
async function loadNews(){
    const el=document.getElementById('nlist');
    for(const src of['news.json','/api/news']){
        try{
            const r=await fetch(src+'?_='+Date.now(),{signal:AbortSignal.timeout(8000)});
            if(!r.ok)continue;
            const d=await r.json();
            if(d.items?.length){renderN(d.items);if(d.updated)document.getElementById('upd').textContent='更新：'+new Date(d.updated).toLocaleString('zh-CN',{timeZone:'Asia/Shanghai'});return;}
        }catch(e){continue}
    }
    el.innerHTML='<li class="nempty">暂无快讯，请稍后刷新</li>';
}
function renderN(items){
    const el=document.getElementById('nlist'),now=Date.now();
    el.innerHTML=items.map((x,i)=>{
        let ts='';
        if(x.pubDate){const m=Math.floor((now-new Date(x.pubDate).getTime())/60000);ts=m<1?'刚刚':m<60?m+'分钟前':m<1440?Math.floor(m/60)+'小时前':Math.floor(m/1440)+'天前'}
        const t=x.title||'',d=x.description||'',l=x.link||'#';
        const tags=[];
        if(/BTC|比特币/i.test(t+d))tags.push('BTC');if(/ETH|以太坊/i.test(t+d))tags.push('ETH');
        if(/SOL|Solana/i.test(t+d))tags.push('SOL');if(/BNB/i.test(t+d))tags.push('BNB');
        if(/币安|Binance/i.test(t+d))tags.push('币安');if(/ETF/i.test(t+d))tags.push('ETF');
        if(/SEC|监管/i.test(t+d))tags.push('监管');if(/DeFi/i.test(t+d))tags.push('DeFi');
        if(/NFT/i.test(t+d))tags.push('NFT');if(/空投|airdrop/i.test(t+d))tags.push('空投');
        const hasD=d&&d!==t&&d.length>10;
        return`<li class="ni">
<div class="nh"><div class="nt-badge"><span>${ts}</span></div><div class="nb"><div class="ntitle">${t}</div>${tags.length?'<div class="ntags">'+tags.map(g=>'<span class="ntag">'+g+'</span>').join('')+'</div>':''}</div></div>
${hasD?'<div class="nexp"><div class="ndesc">'+d+' <a href="'+l+'" target="_blank">原文→</a></div></div>':''}
</li>`;
    }).join('');
}

// PRICES
async function loadP(){
    try{
        const r=await fetch('https://api.binance.com/api/v3/ticker/24hr?symbols='+encodeURIComponent(JSON.stringify(COINS.map(c=>c.s))));
        const d=await r.json();const m={};d.forEach(t=>m[t.symbol]=t);
        const items=COINS.map(c=>({...c,price:+(m[c.s]?.lastPrice||0),chg:+(m[c.s]?.priceChangePercent||0)}));
        // Live bar
        let lbHtml=items.map(c=>{
            const u=c.chg>=0,ps=c.price>=1?'$'+c.price.toLocaleString('en',{maximumFractionDigits:2}):'$'+c.price.toFixed(6);
            return`<div class="lc"><span class="s">${c.sym}</span><span class="p">${ps}</span><span class="c ${u?'up':'dn'}">${u?'▲+':'▼'}${Math.abs(c.chg).toFixed(2)}%</span></div>`;
        }).join('');
        document.getElementById('liveBar').innerHTML=lbHtml+lbHtml;
        // Price list
        document.getElementById('plist').innerHTML=items.map(c=>{
            const u=c.chg>=0,ps=c.price>=1?'$'+c.price.toLocaleString('en',{minimumFractionDigits:2,maximumFractionDigits:2}):'$'+c.price.toFixed(8);
            return`<div class="pr"><div class="pl"><div class="pi">${c.i}</div><div><div class="pn">${c.sym}</div><div class="ps">${c.n}</div></div></div><div style="text-align:right"><div class="pv">${ps}</div><div class="pc ${u?'up':'dn'}">${u?'▲ +':'▼ '}${Math.abs(c.chg).toFixed(2)}%</div></div></div>`;
        }).join('');
    }catch(e){}
}

// EXCHANGES
function renderE(){
    document.getElementById('elist').innerHTML=EX.map(x=>`
<div class="ec${x.top?' top':''}" onclick="this.classList.toggle('open')">
<div class="erow"><div class="einfo"><div class="eico" style="background:${x.color}20;color:${x.color}">${x.icon}</div><div><div class="en">${x.name}</div><div class="em">${x.rank} · ${x.coins}币种 · ${x.fee} · ${x.desc}</div></div></div>
<a href="${x.url}" target="_blank" class="ebtn" style="background:${x.color};color:${x.color==='#FFFFFF'||x.color==='#F0B90B'?'#000':'#fff'}" onclick="event.stopPropagation()">注册</a></div>
<div class="edet"><ul class="ef">${x.ft.map(f=>'<li>'+f+'</li>').join('')}</ul>
<div class="ecode">邀请码 <strong>${x.code}</strong> · ${x.disc} <span style="font-size:.78em;color:var(--gray)">注册后无法补填</span></div></div>
</div>`).join('');
}

// PWA
let dp=null;
window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();dp=e;setTimeout(()=>{if(!localStorage.getItem('_i'))document.getElementById('ib').classList.add('show')},5000)});
document.getElementById('ibtn')?.addEventListener('click',async()=>{if(dp){dp.prompt();const r=await dp.userChoice;if(r.outcome==='accepted')localStorage.setItem('_i','1');dp=null}else alert('iOS：点分享⬆️→添加到主屏幕');document.getElementById('ib').classList.remove('show')});
document.getElementById('ic')?.addEventListener('click',()=>{document.getElementById('ib').classList.remove('show');localStorage.setItem('_i','1')});
if(/iPhone|iPad/.test(navigator.userAgent)&&!navigator.standalone)setTimeout(()=>{if(!localStorage.getItem('_i'))document.getElementById('ib').classList.add('show')},8000);
if('serviceWorker' in navigator)navigator.serviceWorker.register('sw.js').catch(()=>{});

// INIT
renderE();loadP();loadNews();
setInterval(loadP,10000);
setInterval(loadNews,60000);
</script>
</body>
</html>
