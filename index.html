<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>马上发财快讯</title>
<meta http-equiv="Cache-Control" content="no-cache,no-store,must-revalidate">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🤑</text></svg>">
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#f0b90b">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#f5f6fa;--c1:#fff;--c2:#f8f9fc;--bd:#e8eaef;--tx:#1a1a1a;--g:#667;--gd:#f0b90b;--gn:#0ecb81;--rd:#f6465d}
body{font-family:-apple-system,BlinkMacSystemFont,'Noto Sans SC',sans-serif;background:var(--bg);color:var(--tx);line-height:1.5;padding-bottom:60px}
a{color:inherit;text-decoration:none}
.w{max-width:920px;margin:0 auto;padding:0 12px}
header{background:#fff;border-bottom:1px solid var(--bd);padding:10px 0;position:sticky;top:0;z-index:99}
header .w{display:flex;justify-content:space-between;align-items:center}
.logo{font-size:1.05em;font-weight:900}
.logo em{font-style:normal;background:linear-gradient(135deg,var(--gd),#ff8c00);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.tabs{display:flex;gap:2px}
.tab{font-size:.75em;padding:4px 10px;border-radius:6px;cursor:pointer;color:var(--g);transition:.2s}
.tab.on{background:var(--gd);color:#000;font-weight:700}
.tkr{overflow:hidden;background:#fff;border-bottom:1px solid var(--bd)}
.tkr-in{display:flex;animation:tkr 15s linear infinite;white-space:nowrap}
.tk{display:inline-flex;align-items:center;gap:5px;padding:8px 16px;border-right:1px solid var(--bd);font-size:.78em}
.tk b{font-weight:700}.tk .u{color:var(--gn)}.tk .d{color:var(--rd)}
@keyframes tkr{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
.pg{display:none}.pg.on{display:block}
.sh{padding:12px 0 8px;display:flex;justify-content:space-between;align-items:center}
.sh h2{font-size:1.1em;font-weight:800}
.sh h2 em{font-style:normal;color:var(--gd)}
.lv{font-size:.7em;color:var(--gn);display:flex;align-items:center;gap:3px}
.lv i{width:5px;height:5px;background:var(--gn);border-radius:50%;animation:bl 1.5s infinite}
@keyframes bl{50%{opacity:.2}}
.ut{font-size:.68em;color:var(--g);margin-bottom:8px}
.nl{list-style:none}
.ni{background:#fff;border:1px solid var(--bd);border-radius:10px;margin-bottom:6px;padding:11px}
.ni:first-child{border-color:var(--gd)50;box-shadow:0 0 6px var(--gd)15}
.ni-t{font-size:.68em;color:var(--g);margin-bottom:3px;display:flex;gap:6px;align-items:center}
.ni-h{font-size:.88em;font-weight:600;line-height:1.45;margin-bottom:3px}
.ni-d{font-size:.8em;color:var(--g);line-height:1.65}
.ni-tags{display:flex;gap:2px;flex-wrap:wrap;margin-top:4px}
.ni-tags span{font-size:.6em;padding:1px 5px;background:#f0f3ff;border-radius:3px;color:#3b5bdb}
.ne{text-align:center;padding:35px;color:var(--g);font-size:.85em}
.ns{margin-bottom:16px}
.ns-head{display:flex;align-items:center;gap:6px;padding:10px 0 8px;border-bottom:2px solid var(--gd);margin-bottom:8px}
.ns-icon{font-size:1.1em}
.ns-title{font-weight:800;font-size:.95em;flex:1}
.ptabs{display:flex;gap:3px;margin-bottom:10px;overflow-x:auto;padding-bottom:2px}
.ptabs::-webkit-scrollbar{display:none}
.pt{font-size:.78em;padding:6px 14px;border-radius:6px;background:#fff;border:1px solid var(--bd);cursor:pointer;white-space:nowrap;color:var(--g);transition:.2s;font-weight:500}
.pt.on{background:var(--gd);color:#000;border-color:var(--gd);font-weight:700}
.phead{display:flex;padding:8px 12px;background:#fff;border-bottom:1px solid var(--bd);font-size:.7em;color:var(--g)}
.phead span{flex:1;text-align:right}.phead span:first-child{text-align:left}
.pl{display:flex;flex-direction:column}
.pr{display:flex;align-items:center;padding:12px;background:#fff;border-bottom:1px solid var(--bd);transition:.15s}
.pr:hover{background:var(--c2)}
.pr .l{display:flex;align-items:center;gap:8px;flex:2;min-width:0}
.pr .rk{font-size:.72em;color:var(--g);min-width:22px;text-align:center;flex-shrink:0}
.pr .nm{font-weight:700;font-size:.88em;white-space:nowrap}
.pr .sy{font-size:.68em;color:var(--g);margin-left:4px}
.pr .tag{font-size:.65em;padding:1px 6px;background:#f0f3ff;border-radius:3px;color:#3b5bdb;margin-left:6px}
.pr .vol{font-size:.68em;color:var(--g);margin-top:2px}
.pr .r{flex:1;text-align:right;min-width:70px}
.pr .prc{font-weight:700;font-size:.88em}
.pr .cny{font-size:.65em;color:var(--g);margin-top:1px}
.pr .chg{display:inline-block;padding:4px 10px;border-radius:4px;font-size:.78em;font-weight:600;margin-top:2px;min-width:72px;text-align:center}
.pr .chg.u{background:rgba(14,203,129,.1);color:var(--gn)}
.pr .chg.d{background:rgba(246,70,93,.1);color:var(--rd)}
.el{display:flex;flex-direction:column;gap:6px;padding-bottom:14px}
.ec{background:#fff;border:1px solid var(--bd);border-radius:10px;padding:12px;cursor:pointer}
.ec:hover{border-color:var(--gd)40}
.ec.tp{border-left:3px solid var(--gd)}
.ec .top{display:flex;justify-content:space-between;align-items:center}
.ec .inf{display:flex;align-items:center;gap:8px}
.ec .ico{width:32px;height:32px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:1.1em}
.ec .nm{font-weight:700;font-size:.88em}
.ec .mt{font-size:.68em;color:var(--g);margin-top:1px}
.ec .btn{padding:5px 12px;border-radius:6px;font-weight:700;font-size:.72em}
.ec .det{margin-top:8px;padding-top:8px;border-top:1px solid var(--bd);display:none}
.ec.op .det{display:block}
.ec .ft{list-style:none;display:grid;grid-template-columns:1fr 1fr;gap:2px}
.ec .ft li{font-size:.72em;color:var(--g)}
.ec .ft li::before{content:'✓ ';color:var(--gn)}
.ec .cd{margin-top:6px;background:#f8f9fc;padding:6px 9px;border-radius:5px;font-size:.75em}
.ec .cd b{color:var(--gn)}
.bn{position:fixed;bottom:0;left:0;right:0;background:#fff;backdrop-filter:blur(12px);border-top:1px solid var(--bd);padding:4px 0;z-index:99}
.bn>div{display:flex;justify-content:space-around;max-width:400px;margin:0 auto}
.bt{display:flex;flex-direction:column;align-items:center;gap:1px;color:var(--g);font-size:.6em;padding:3px 10px;cursor:pointer;border:none;background:none}
.bt.on{color:var(--gd)}
.bt .i{font-size:1.25em}
@media(min-width:768px){.bn{display:none}body{padding-bottom:0}}
/* AI 荐股 */
.ai-card{background:linear-gradient(135deg,#fff,#fef9f3);border:1px solid var(--gd);border-radius:12px;padding:14px;margin-bottom:10px}
.ai-card .hd{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.ai-card .ico{font-size:1.3em}
.ai-card .tit{font-weight:700;font-size:.9em}
.ai-card .tag{font-size:.65em;padding:2px 6px;background:var(--gd);border-radius:4px;color:#000;font-weight:700}
.ai-card .rec{font-size:.85em;line-height:1.6;margin-bottom:6px}
.ai-card .rec b{color:var(--gd)}
.ai-card .meta{display:flex;justify-content:space-between;font-size:.68em;color:var(--g);border-top:1px dashed var(--bd);padding-top:6px}
.ai-card .rs{font-size:.7em;color:var(--gn);font-weight:600}
.ai-card .conf{font-size:.7em;color:var(--g)}
.ai-refresh{display:block;width:100%;padding:10px;background:var(--gd);border:none;border-radius:8px;font-weight:700;font-size:.85em;cursor:pointer;margin-top:10px}
.ai-refresh:active{opacity:.8}
</style>
</head>
<body>

<header><div class="w">
<div class="logo">🤑 <em>马上发财快讯</em></div>
<div class="tabs" id="T">
    <div class="tab on" data-p="news">快讯</div>
    <div class="tab" data-p="crypto">加密货币</div>
    <div class="tab" data-p="stocks">股市</div>
    <div class="tab" data-p="ai">AI 荐股</div>
    <div class="tab" data-p="ex">交易所</div>
</div>
</div></header>

<div class="tkr"><div class="tkr-in" id="tkr">加载中...</div></div>

<!-- ========== 快讯 ========== -->
<div class="pg on" id="p-news"><div class="w">
    <div class="ut" id="ut"></div>
    <div class="ns">
        <div class="ns-head"><span class="ns-icon">🪙</span><span class="ns-title">加密快讯</span><div class="lv"><i></i>LIVE</div></div>
        <ul class="nl" id="nl"><li class="ne">⏳ 加载中...</li></ul>
    </div>
</div></div>

<!-- ========== 加密货币 ========== -->
<div class="pg" id="p-crypto"><div class="w">
    <div class="sh"><h2>📊 <em>加密货币行情</em></h2></div>
    <div class="ptabs" id="ptabs">
        <div class="pt on" data-r="up">🔥 涨幅榜</div>
        <div class="pt" data-r="down">💧 跌幅榜</div>
        <div class="pt" data-r="hot">⚡ 成交额榜</div>
        <div class="pt" data-r="vol">📊 全部币种</div>
    </div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px"><span id="pcnt" style="font-size:.72em;color:var(--g)"></span></div>
    <div class="phead"><span>名称 / 24H 成交额</span><span>最新价</span><span>24H 涨幅</span></div>
    <div class="pl" id="pl"></div>
</div></div>

<!-- ========== 股市 ========== -->
<div class="pg" id="p-stocks"><div class="w">
    <div class="sh"><h2>📈 <em>全球股市</em></h2></div>
    <div class="ptabs" id="stabs">
        <div class="pt on" data-m="a">🇨🇳 A 股</div>
        <div class="pt" data-m="hk">🇭🇰 港股</div>
        <div class="pt" data-m="us">🇺🇸 美股</div>
    </div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px"><span id="scnt" style="font-size:.72em;color:var(--g)"></span><span id="stime" style="font-size:.68em;color:var(--g)"></span></div>
    <div class="phead"><span>名称 / 代码</span><span>最新价</span><span>涨跌幅</span></div>
    <div class="pl" id="sl"></div>
</div></div>

<!-- ========== AI 荐股 ========== -->
<div class="pg" id="p-ai"><div class="w">
    <div class="sh"><h2>🤖 <em>AI 智能推荐</em></h2></div>
    <p style="color:var(--g);font-size:.75em;margin-bottom:10px">基于技术面 + 资金面 AI 分析 · 仅供参考不构成投资建议</p>
    <div class="ptabs" id="aitabs">
        <div class="pt on" data-t="stock">📈 股票推荐</div>
        <div class="pt" data-t="crypto">🪙 数字货币推荐</div>
    </div>
    <div id="ai-content"></div>
    <button class="ai-refresh" onclick="loadAI()">🔄 刷新推荐</button>
</div></div>

<!-- ========== 交易所 ========== -->
<div class="pg" id="p-ex"><div class="w">
    <div class="sh"><h2>🏦 <em>七大交易所</em></h2></div>
    <p style="color:var(--g);font-size:.75em;margin-bottom:10px">邀请码注册永久减手续费 · 注册后无法补填</p>
    <div class="el" id="el"></div>
</div></div>

<nav class="bn"><div id="BN">
    <button class="bt on" data-p="news"><span class="i">📰</span>快讯</button>
    <button class="bt" data-p="crypto"><span class="i">🪙</span>加密货币</button>
    <button class="bt" data-p="stocks"><span class="i">📈</span>股市</button>
    <button class="bt" data-p="ai"><span class="i">🤖</span>AI 荐股</button>
    <button class="bt" data-p="ex"><span class="i">🏦</span>交易所</button>
</div></nav>

<script>
function go(p){
    document.querySelectorAll('.pg').forEach(x=>x.classList.remove('on'));
    document.getElementById('p-'+p)?.classList.add('on');
    document.querySelectorAll('[data-p]').forEach(x=>x.classList.toggle('on',x.dataset.p===p));
}
document.getElementById('T').onclick=e=>{const t=e.target.closest('[data-p]');if(t)go(t.dataset.p)};
document.getElementById('BN').onclick=e=>{const t=e.target.closest('[data-p]');if(t)go(t.dataset.p)};

// ==================== NEWS ====================
async function loadNews(){
    try{
        const r=await fetch('news.json?_='+Date.now());
        if(!r.ok)throw 0;
        const d=await r.json();
        if(d.items?.length)renderN(d.items);
        if(d.updated)document.getElementById('ut').textContent='更新：'+new Date(d.updated).toLocaleString('zh-CN',{timeZone:'Asia/Shanghai'});
    }catch(e){document.getElementById('nl').innerHTML='<li class="ne">暂无快讯</li>'}
}
function renderN(items){
    const now=Date.now();
    function renderList(list){
        return list.map(x=>{
            let ts='';
            if(x.pubDate){const m=Math.floor((now-new Date(x.pubDate).getTime())/60000);ts=m<1?'刚刚':m<60?m+'分钟前':m<1440?Math.floor(m/60)+'小时前':Math.floor(m/1440)+'天前'}
            const t=x.title||'',d=x.description||'';
            const tags=[];const td=t+d;
            if(/BTC|比特币/i.test(td))tags.push('BTC');if(/ETH|以太坊/i.test(td))tags.push('ETH');
            if(/SOL|Solana/i.test(td))tags.push('SOL');if(/BNB/i.test(td))tags.push('BNB');
            if(/币安|Binance/i.test(td))tags.push('币安');if(/ETF/i.test(td))tags.push('ETF');
            if(/空投|airdrop/i.test(td))tags.push('空投');
            return`<li class="ni"><div class="ni-t">${ts}</div><div class="ni-h">${t}</div>${d&&d!==t?'<div class="ni-d">'+d+'</div>':''}${tags.length?'<div class="ni-tags">'+tags.map(g=>'<span>'+g+'</span>').join('')+'</div>':''}</li>`;
        }).join('')||'<li class="ne">暂无快讯</li>';
    }
    document.getElementById('nl').innerHTML=renderList(items);
}

// ==================== CRYPTO PRICES ====================
const STABLES=new Set(['USDC','USDT','BUSD','DAI','TUSD','FDUSD','USD1','RLUSD','USDP','PYUSD','EURC','PAXG','AEUR']);
let allPriceData=[];
let currentRank='up';

async function loadP(){
    try{
        const r=await fetch('https://api.binance.com/api/v3/ticker/24hr');
        const d=await r.json();
        allPriceData=d.filter(t=>t.symbol.endsWith('USDT')&&+t.quoteVolume>50000)
            .map(t=>{
                const sym=t.symbol.replace('USDT','');
                if(STABLES.has(sym))return null;
                return{sym,price:+t.lastPrice,chg:+t.priceChangePercent,vol:+t.quoteVolume};
            }).filter(Boolean);
        const top10=[...allPriceData].sort((a,b)=>b.vol-a.vol).slice(0,10);
        let th=top10.map(c=>{
            const u=c.chg>=0,ps=c.price>=1?'$'+c.price.toLocaleString('en',{maximumFractionDigits:2}):'$'+c.price.toFixed(6);
            return`<span class="tk"><b>${c.sym}</b> ${ps} <span class="${u?'u':'d'}">${u?'▲':'▼'}${Math.abs(c.chg).toFixed(2)}%</span></span>`;
        }).join('');
        document.getElementById('tkr').innerHTML=th+th;
        renderR();
        document.getElementById('pcnt').textContent=allPriceData.length+' 个币种';
    }catch(e){console.error(e)}
}

function renderR(){
    const tab=currentRank;
    let data=[...allPriceData];
    if(tab==='up')data.sort((a,b)=>b.chg-a.chg);
    else if(tab==='down')data.sort((a,b)=>a.chg-b.chg);
    else if(tab==='hot')data.sort((a,b)=>b.vol-a.vol);
    else data.sort((a,b)=>b.vol-a.vol);
    const html=data.map((c,i)=>{
        const u=c.chg>=0;
        const ps=c.price>=1?c.price.toLocaleString('en',{maximumFractionDigits:2}):c.price.toFixed(6);
        const cny=(c.price*7.25).toFixed(2);
        const chgClass=u?'u':'d';
        const chgSign=u?'+':'';
        const tag=c.vol>1e9?'<span class="tag">热门</span>':'';
        const vol=c.vol>1e9?(c.vol/1e9).toFixed(2)+'B':c.vol>1e6?(c.vol/1e6).toFixed(2)+'M':(c.vol/1e3).toFixed(2)+'K';
        return`<div class="pr"><div class="l"><span class="rk">#${i+1}</span><span class="nm">${c.sym}</span><span class="sy">USDT</span>${tag}<div class="vol">24H 成交额 $${vol}</div></div><div class="r"><div class="prc">$${ps}</div><div class="cny">¥${cny}</div><span class="chg ${chgClass}">${chgSign}${c.chg.toFixed(2)}%</span></div></div>`;
    }).join('');
    document.getElementById('pl').innerHTML=html;
}

document.getElementById('ptabs').onclick=e=>{
    const t=e.target.closest('.pt');
    if(!t)return;
    document.querySelectorAll('.pt').forEach(x=>x.classList.remove('on'));
    t.classList.add('on');
    currentRank=t.dataset.r;
    renderR();
};

// ==================== STOCKS ====================
const STOCKS={
    a:[{s:'sh000001',n:'上证指数'},{s:'sz399001',n:'深证成指'},{s:'sz399006',n:'创业板指'},{s:'sh600519',n:'贵州茅台'},{s:'sz000858',n:'五粮液'},{s:'sh601318',n:'中国平安'},{s:'sh600036',n:'招商银行'},{s:'sz000333',n:'美的集团'},{s:'sz002594',n:'比亚迪'},{s:'sh601888',n:'中国中免'}],
    hk:[{s:'hk00700',n:'腾讯控股'},{s:'hk09988',n:'阿里巴巴'},{s:'hk03690',n:'美团 -W'},{s:'hk02318',n:'中国平安'},{s:'hk00005',n:'汇丰控股'},{s:'hk01810',n:'小米集团'},{s:'hk00388',n:'港交所'},{s:'hk00941',n:'中国移动'},{s:'hk02015',n:'理想汽车'},{s:'hk09866',n:'蔚来'}],
    us:[{s:'gb_aapl',n:'苹果 AAPL'},{s:'gb_msft',n:'微软 MSFT'},{s:'gb_goog',n:'谷歌 GOOG'},{s:'gb_amzn',n:'亚马逊 AMZN'},{s:'gb_nvda',n:'英伟达 NVDA'},{s:'gb_meta',n:'Meta META'},{s:'gb_tsla',n:'特斯拉 TSLA'},{s:'gb_baba',n:'阿里巴巴 BABA'},{s:'gb_jd',n:'京东 JD'},{s:'gb_pdd',n:'拼多多 PDD'}]
};
let currentMarket='a';
let stockData={a:[],hk:[],us:[]};

async function loadStocks(){
    const m=currentMarket;
    try{
        if(m==='a'){
            const syms=STOCKS.a.map(x=>x.s).join(',');
            const r=await fetch('https://hq.sinajs.cn/list='+syms+'&_='+Date.now());
            const t=await r.text();
            stockData.a=t.split('\n').filter(x=>x).map((x,i)=>{
                const d=x.match(/="([^"]+)"/);
                if(!d)return null;
                const p=d[1].split(',');
                const name=STOCKS.a[i].n,code=STOCKS.a[i].s;
                const price=+p[3],prev=+p[2];
                const chg=prev?((price-prev)/prev*100):0;
                return{name,code:code.replace(/^(sh|sz)/,'').toUpperCase(),price,chg};
            }).filter(Boolean);
        }else if(m==='hk'){
            const syms=STOCKS.hk.map(x=>x.s.replace('hk','')).join(',');
            const r=await fetch('https://quotes.sina.cn/hq/api/jsonp.php=/var+/HK_StockService.getHKMarketData?symbol='+syms+'&_='+Date.now());
            const t=await r.text();
            const json=JSON.parse(t.match(/\[(.*)\]/s)?.[0]||'[]');
            stockData.hk=json.map(x=>({name:x.name,code:x.symbol,price:+x.price||0,chg:+x.change||0}));
        }else{
            const syms=STOCKS.us.map(x=>x.s.replace('gb','')).join(',');
            const r=await fetch('https://quotes.sina.cn/hq/api/jsonp.php=/var+/US_StockService.getUSMarketData?symbol='+syms+'&_='+Date.now());
            const t=await r.text();
            const json=JSON.parse(t.match(/\[(.*)\]/s)?.[0]||'[]');
            stockData.us=json.map(x=>({name:x.name,code:x.symbol,price:+x.price||0,chg:+x.change||0}));
        }
        renderS();
        const now=new Date();
        document.getElementById('stime').textContent='更新：'+now.toLocaleTimeString('zh-CN');
    }catch(e){console.error('Stock error:',e)}
}

function renderS(){
    const data=stockData[currentMarket]||[];
    const html=data.map((c,i)=>{
        const u=c.chg>=0;
        const ps=c.price>=1?c.price.toFixed(2):c.price.toFixed(4);
        const chgClass=u?'u':'d';
        const chgSign=u?'+':'';
